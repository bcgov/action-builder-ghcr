name: 'Build and Push to GHCR'
description: 'This Action has moved to bcgov/actions/builder-ghcr'
author: 'Om Mishra <om.mishra@gov.bc.ca>'
inputs:
  package:
    description: 'The directory containing the code/Dockerfile. Typically matches the image name.'
    required: true
  build_context:
    description: 'Optional path to the Docker build context. Defaults to the package directory.'
    required: false
  build_file:
    description: 'Optional path to the Dockerfile. Defaults to ${package}/Dockerfile.'
    required: false
  build_args:
    description: 'List of build-time variables (multi-line or comma-separated).'
    required: false
  secrets:
    description: 'List of secrets to expose to the build (multi-line or comma-separated).'
    required: false
  target:
    description: 'Sets the target stage to build.'
    required: false
  image:
    description: 'The name of the image. Defaults to the package name.'
    required: false
  tag_fallback:
    description: 'Fallback tag to use if the image exists. Used for fallback pull/retag.'
    required: false
    default: 'latest'
  tags:
    description: 'Multi-line list of tags to push.'
    required: true
  triggers:
    description: 'Multi-line git diff paths to evaluate. If no changes match, build is skipped and fallback image is retagged.'
    required: false
  metadata_tags:
    description: 'Automatically generate tags based on metadata.'
    required: false
    default: 'false'
  metadata_flavor:
    description: 'Behavior of tag replacement (e.g. prefix, suffix).'
    required: false
  github_token:
    description: 'Token to authenticate with GHCR. Defaults to github.token.'
    required: false
    default: ${{ github.token }}
  repository:
    description: 'The repository to fetch if building code from outside the current repository.'
    required: false
    default: ${{ github.repository }}

outputs:
  digest:
    description: 'The image digest of the pushed image.'
    value: ${{ steps.builder.outputs.digest }}
  image_path:
    description: 'The primary path and tag of the generated/retagged image.'
    value: ${{ steps.builder.outputs.image_path }}

runs:
  using: 'composite'
  steps:
    - name: Deprecation warning
      shell: bash
      run: |
        echo "::warning::This Action has moved to bcgov/actions/builder-ghcr. Please update your workflows to use bcgov/actions/builder-ghcr@vX.Y.Z instead."

    - name: Forward Action
      id: builder
      uses: bcgov/actions/builder-ghcr@v0.2.0
      with:
        package: ${{ inputs.package }}
        build_context: ${{ inputs.build_context }}
        build_file: ${{ inputs.build_file }}
        build_args: ${{ inputs.build_args }}
        secrets: ${{ inputs.secrets }}
        target: ${{ inputs.target }}
        image: ${{ inputs.image }}
        tag_fallback: ${{ inputs.tag_fallback }}
        tags: ${{ inputs.tags }}
        triggers: ${{ inputs.triggers }}
        metadata_tags: ${{ inputs.metadata_tags }}
        metadata_flavor: ${{ inputs.metadata_flavor }}
        github_token: ${{ inputs.github_token }}
        repository: ${{ inputs.repository }}
